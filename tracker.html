<!DOCTYPE html>
<html>
<head>
  <title>Life Tracker Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input {
      background: #020617;
      color: white;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .log {
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .time {
      color: #38bdf8;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>🔥 Life Tracker Pro</header>

<div class="container">

  <div class="card">
    <h3 id="date"></h3>

    <input type="time" id="start">
    <input type="time" id="end">
    <input type="text" id="task" placeholder="What did you do?">

    <button onclick="addTask()">Add Task</button>
  </div>

  <div class="card">
    <h3>📅 Your Logs</h3>
    <div id="logs"></div>
  </div>

</div>

<script>

let today = new Date();
document.getElementById("date").innerText = today.toDateString();

let data = JSON.parse(localStorage.getItem("tasks")) || [];

function display() {
  let logs = document.getElementById("logs");
  logs.innerHTML = "";

  data.forEach((item) => {
    logs.innerHTML += `
      <div class="log">
        <div class="time">${item.start} - ${item.end}</div>
        <div>${item.task}</div>
        <small>${item.date}</small>
      </div>
    `;
  });
}

function addTask() {
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let task = document.getElementById("task").value;

  if (!start || !end || !task) {
    alert("Fill all fields!");
    return;
  }

  let entry = {
    date: new Date().toDateString(),
    start,
    end,
    task
  };

  data.unshift(entry);
  localStorage.setItem("tasks", JSON.stringify(data));

  display();
}

display();

</script>

</body>
</html>
